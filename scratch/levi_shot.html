<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>RUNNING</title></head>
<body>
<script type="module">
import { PlayState } from '../src/play.js';

const canvas = document.createElement('canvas');
canvas.width = 320; canvas.height = 240;
canvas.id = 'view';
document.body.appendChild(canvas);
const g = canvas.getContext('2d');
g.imageSmoothingEnabled = false;

const game = {
  coins: 0, totalCoins: 0, lives: 3, power: 'small',
  save: { unlocked: 40 }, cleared: false,
  onLevelCleared() { this.cleared = true; },
  onPlayerDied() {},
};

const play = new PlayState(game, 34); // Leviathan's Trench

const url = new URL(location.href);
const frames = parseInt(url.searchParams.get('frames') || '300', 10);
const forceStun = url.searchParams.get('stun') === '1';
const forcePhase = url.searchParams.get('phase') === '2';

for (let f = 0; f < frames; f++) {
  play.update();
  if (forcePhase && play.boss && play.boss.phase === 1 && f === 150) {
    play.boss.phase = 2;
  }
  if (forceStun && play.boss && f === 250) {
    play.boss.state = 'stunned';
    play.boss.timer = 200;
    play.boss.shieldActive = false;
  }
}
if (play.boss) {
  play.camera.x = Math.max(0, Math.min(play.boss.cx - 160, play.level.pxWidth - 320));
  play.camera.y = Math.max(0, Math.min(play.boss.cy - 120, play.level.pxHeight - 240));
}
play.draw(g);
document.title = 'DONE';
</script>
</body>
</html>
